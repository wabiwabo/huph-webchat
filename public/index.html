<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUPH Admission - Enterprise Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-bounce { animation: bounce 0.6s ease-in-out infinite; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 min-h-screen">
  <div id="app" class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-xl border-b border-gray-200 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center text-white text-xl">🎓</div>
          <div>
            <h1 class="text-xl font-bold text-gray-900">HUPH Admission</h1>
            <p class="text-xs text-gray-500">Enterprise Chat System</p>
          </div>
        </div>
        <span id="status" class="flex items-center gap-2 px-3 py-1 rounded-full bg-gray-100 text-sm">
          <span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
          <span>Connecting...</span>
        </span>
      </div>
    </header>

    <!-- Main -->
    <main class="flex-1 max-w-7xl w-full mx-auto flex gap-6 p-6">
      <!-- Sidebar -->
      <aside class="hidden lg:block w-80 flex-shrink-0">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 sticky top-24">
          <h2 class="font-semibold text-gray-900 mb-4">Pertanyaan Populer</h2>
          <div class="space-y-2">
            <button onclick="quick('Program studi apa saja yang tersedia di UPH?')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-indigo-50 text-gray-700 text-sm">📚 Program Studi</button>
            <button onclick="quick('Berapa biaya pendaftaran UPH?')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-indigo-50 text-gray-700 text-sm">💰 Biaya Pendaftaran</button>
            <button onclick="quick('Apa saja syarat pendaftaran UPH?')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-indigo-50 text-gray-700 text-sm">📋 Syarat Pendaftaran</button>
            <button onclick="quick('Kapan pendaftaran dibuka?')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-indigo-50 text-gray-700 text-sm">📅 Jadwal Pendaftaran</button>
            <button onclick="quick('Apakah ada beasiswa di UPH?')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-indigo-50 text-gray-700 text-sm">🎓 Beasiswa</button>
          </div>
          <div class="mt-6 pt-6 border-t">
            <div class="flex justify-between text-sm"><span class="text-gray-500">Messages</span><span id="msg-count" class="font-medium">0</span></div>
          </div>
        </div>
      </aside>

      <!-- Chat -->
      <div class="flex-1 flex flex-col bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-6">
          <div id="welcome" class="text-center py-16">
            <div class="w-20 h-20 bg-gradient-to-br from-indigo-100 to-purple-100 rounded-2xl flex items-center justify-center text-4xl mx-auto mb-6">👋</div>
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Selamat Datang!</h2>
            <p class="text-gray-500 max-w-md mx-auto">Saya adalah asisten virtual UPH. Tanyakan seputar pendaftaran, program studi, beasiswa, dan lainnya.</p>
          </div>
        </div>
        <div class="border-t p-4 bg-gray-50/50">
          <form id="chat-form" class="flex gap-3">
            <input type="text" id="input" placeholder="Ketik pertanyaanmu..." class="flex-1 px-5 py-4 bg-white border border-gray-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 outline-none text-gray-900" autocomplete="off">
            <button type="submit" id="send-btn" class="px-6 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl hover:from-indigo-700 hover:to-purple-700 disabled:opacity-50 font-medium">Kirim 🚀</button>
          </form>
          <p class="text-xs text-gray-400 mt-3 text-center">Powered by HUPH AI • Enterprise Chat System</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    const socket = io(window.location.origin + '/chat', { transports: ['websocket', 'polling'], reconnection: true });
    const convId = 'conv-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    let msgCount = 0;

    const $ = id => document.getElementById(id);
    const messages = $('messages');
    const welcome = $('welcome');
    const form = $('chat-form');
    const input = $('input');
    const sendBtn = $('send-btn');
    const status = $('status');
    const msgCountEl = $('msg-count');

    socket.on('connect', () => {
      status.innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500"></span><span class="text-gray-600">Connected</span>';
      socket.emit('join', convId);
    });

    socket.on('disconnect', () => {
      status.innerHTML = '<span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span><span class="text-gray-600">Disconnected</span>';
    });

    socket.on('stream', (data) => {
      if (welcome) welcome.remove();
      let el = document.getElementById('streaming');
      if (!el) {
        el = document.createElement('div');
        el.id = 'streaming';
        el.className = 'flex justify-start';
        el.innerHTML = '<div class="flex gap-3 max-w-[85%]"><div class="w-8 h-8 rounded-lg flex items-center justify-center text-sm bg-gradient-to-br from-indigo-100 to-purple-100">🎓</div><div class="bg-gray-100 text-gray-900 px-5 py-3 rounded-2xl rounded-tl-md"><p class="text-sm leading-relaxed whitespace-pre-wrap"></p></div></div>';
        messages.appendChild(el);
      }
      el.querySelector('p').textContent = data.content;
      messages.scrollTop = messages.scrollHeight;
      if (data.done) el.removeAttribute('id');
    });

    socket.on('error', (data) => {
      addMessage('assistant', data.error || 'Terjadi kesalahan.');
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const msg = input.value.trim();
      if (!msg) return;
      addMessage('user', msg);
      input.value = '';
      socket.emit('message', { conversationId: convId, message: msg });
      msgCount += 2;
      msgCountEl.textContent = msgCount;
    });

    function addMessage(role, content) {
      if (welcome) welcome.remove();
      const div = document.createElement('div');
      const isUser = role === 'user';
      div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
      div.innerHTML = `<div class="flex gap-3 max-w-[85%] ${isUser ? 'flex-row-reverse' : ''}"><div class="w-8 h-8 rounded-lg flex items-center justify-center text-sm flex-shrink-0 ${isUser ? 'bg-indigo-600 text-white' : 'bg-gradient-to-br from-indigo-100 to-purple-100'}">${isUser ? '👤' : '🎓'}</div><div class="${isUser ? 'bg-gradient-to-r from-indigo-600 to-purple-600 text-white' : 'bg-gray-100 text-gray-900'} px-5 py-3 rounded-2xl ${isUser ? 'rounded-tr-md' : 'rounded-tl-md'}"><p class="text-sm leading-relaxed whitespace-pre-wrap">${content}</p></div></div>`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function quick(msg) { input.value = msg; form.dispatchEvent(new Event('submit')); }
    input.focus();
  </script>
</body>
</html>
