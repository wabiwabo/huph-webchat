<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUPH Admission - AI Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-bounce { animation: bounce 0.6s ease-in-out infinite; }
    .typing-dot { animation-delay: 0.1s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #a1a1a1; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 min-h-screen">
  <div id="app" class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-xl border-b border-gray-200 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center text-white text-xl">
            🎓
          </div>
          <div>
            <h1 class="text-xl font-bold text-gray-900">HUPH Admission</h1>
            <p class="text-xs text-gray-500">Asisten Virtual Pendaftaran</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <span id="status-indicator" class="flex items-center gap-2 px-3 py-1 rounded-full bg-gray-100 text-sm">
            <span class="w-2 h-2 rounded-full bg-yellow-500"></span>
            <span class="text-gray-600">Connecting...</span>
          </span>
        </div>
      </div>
    </header>

    <!-- Main Chat Area -->
    <main class="flex-1 max-w-7xl w-full mx-auto flex gap-6 p-6">
      <!-- Sidebar -->
      <aside class="hidden lg:block w-80 flex-shrink-0">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 sticky top-24">
          <h2 class="font-semibold text-gray-900 mb-4">Pertanyaan Populer</h2>
          <div class="space-y-2">
            <button onclick="sendQuickMessage('Program studi apa saja yang tersedia di UPH?')" 
                    class="w-full text-left px-4 py-3 rounded-xl hover:bg-indigo-50 text-gray-700 text-sm transition-all">
              📚 Program Studi
            </button>
            <button onclick="sendQuickMessage('Berapa biaya pendaftaran UPH?')" 
                    class="w-full text-left px-4 py-3 rounded-xl hover:bg-indigo-50 text-gray-700 text-sm transition-all">
              💰 Biaya Pendaftaran
            </button>
            <button onclick="sendQuickMessage('Apa saja syarat pendaftaran UPH?')" 
                    class="w-full text-left px-4 py-3 rounded-xl hover:bg-indigo-50 text-gray-700 text-sm transition-all">
              📋 Syarat Pendaftaran
            </button>
            <button onclick="sendQuickMessage('Kapan pendaftaran dibuka?')" 
                    class="w-full text-left px-4 py-3 rounded-xl hover:bg-indigo-50 text-gray-700 text-sm transition-all">
              📅 Jadwal Pendaftaran
            </button>
            <button onclick="sendQuickMessage('Apakah ada beasiswa di UPH?')" 
                    class="w-full text-left px-4 py-3 rounded-xl hover:bg-indigo-50 text-gray-700 text-sm transition-all">
              🎓 Beasiswa
            </button>
          </div>
          
          <div class="mt-6 pt-6 border-t border-gray-100">
            <h2 class="font-semibold text-gray-900 mb-4">Stats</h2>
            <div class="space-y-3">
              <div class="flex justify-between text-sm">
                <span class="text-gray-500">Messages</span>
                <span id="msg-count" class="font-medium text-gray-900">0</span>
              </div>
              <div class="flex justify-between text-sm">
                <span class="text-gray-500">Response Time</span>
                <span class="font-medium text-gray-900">~1s</span>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <!-- Chat Container -->
      <div class="flex-1 flex flex-col bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <!-- Messages -->
        <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-6">
          <!-- Welcome -->
          <div id="welcome" class="text-center py-16">
            <div class="w-20 h-20 bg-gradient-to-br from-indigo-100 to-purple-100 rounded-2xl flex items-center justify-center text-4xl mx-auto mb-6">
              👋
            </div>
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Selamat Datang!</h2>
            <p class="text-gray-500 max-w-md mx-auto">
              Saya adalah asisten virtual UPH. Tanyakan seputar pendaftaran, program studi, beasiswa, dan lainnya.
            </p>
          </div>
        </div>

        <!-- Input -->
        <div class="border-t border-gray-100 p-4 bg-gray-50/50">
          <form id="chat-form" class="flex gap-3">
            <input 
              type="text" 
              id="message-input" 
              placeholder="Ketik pertanyaanmu..."
              class="flex-1 px-5 py-4 bg-white border border-gray-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 outline-none transition-all text-gray-900 placeholder-gray-400"
              autocomplete="off"
            >
            <button 
              type="submit" 
              id="send-btn"
              class="px-6 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl hover:from-indigo-700 hover:to-purple-700 disabled:opacity-50 transition-all font-medium flex items-center gap-2"
            >
              <span>Kirim</span>
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
              </svg>
            </button>
          </form>
          <p class="text-xs text-gray-400 mt-3 text-center">
            Powered by HUPH AI • Enterprise Chat System
          </p>
        </div>
      </div>
    </main>
  </div>

  <script>
    const socket = io('http://localhost:3103/chat', {
      transports: ['websocket', 'polling'],
      reconnection: true,
      reconnectionAttempts: 10,
      reconnectionDelay: 1000
    });
    
    const conversationId = 'conv-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    let messageCount = 0;
    
    // Elements
    const messagesDiv = document.getElementById('messages');
    const welcomeDiv = document.getElementById('welcome');
    const form = document.getElementById('chat-form');
    const input = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const statusIndicator = document.getElementById('status-indicator');
    const msgCount = document.getElementById('msg-count');
    
    // Socket events
    socket.on('connect', () => {
      console.log('✅ Connected:', socket.id);
      updateStatus('connected', 'Connected');
      socket.emit('join', conversationId);
    });
    
    socket.on('disconnect', () => {
      console.log('❌ Disconnected');
      updateStatus('disconnected', 'Disconnected');
    });
    
    socket.on('connect_error', (err) => {
      console.error('Connection error:', err);
      updateStatus('error', 'Error');
    });
    
    // Handle streaming response
    let currentResponse = '';
    let currentResponseDiv = null;
    
    socket.on('stream', (data) => {
      // Remove welcome message
      if (welcomeDiv) {
        welcomeDiv.remove();
      }
      
      // Create or update response div
      if (!currentResponseDiv) {
        currentResponseDiv = createMessageElement('assistant', '');
        messagesDiv.appendChild(currentResponseDiv);
      }
      
      // Update content
      const contentP = currentResponseDiv.querySelector('p');
      contentP.textContent = data.content;
      currentResponse = data.content;
      
      // Scroll to bottom
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      
      // If done, finalize
      if (data.done) {
        currentResponseDiv = null;
        currentResponse = '';
      }
    });
    
    socket.on('response', (data) => {
      console.log('✅ Final response received');
    });
    
    socket.on('error', (data) => {
      addMessage('assistant', data.error || 'Terjadi kesalahan.');
    });
    
    // Form submit
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;
      
      // Add user message
      addMessage('user', message);
      
      // Clear input
      input.value = '';
      
      // Send to server
      socket.emit('message', {
        conversationId,
        message
      });
      
      // Update count
      messageCount += 2; // user + bot
      msgCount.textContent = messageCount;
    });
    
    // Helper functions
    function addMessage(role, content) {
      if (welcomeDiv) {
        welcomeDiv.remove();
      }
      
      const div = createMessageElement(role, content);
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function createMessageElement(role, content) {
      const div = document.createElement('div');
      div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
      
      const isUser = role === 'user';
      
      div.innerHTML = `
        <div class="flex gap-3 max-w-[85%] ${isUser ? 'flex-row-reverse' : ''}">
          <div class="w-8 h-8 rounded-lg flex items-center justify-center text-sm flex-shrink-0 ${isUser ? 'bg-indigo-600 text-white' : 'bg-gradient-to-br from-indigo-100 to-purple-100'}">
            ${isUser ? '👤' : '🎓'}
          </div>
          <div class="${isUser ? 'bg-gradient-to-r from-indigo-600 to-purple-600 text-white' : 'bg-gray-100 text-gray-900'} px-5 py-3 rounded-2xl ${isUser ? 'rounded-tr-md' : 'rounded-tl-md'}">
            <p class="text-sm leading-relaxed whitespace-pre-wrap">${content}</p>
          </div>
        </div>
      `;
      
      return div;
    }
    
    function updateStatus(status, text) {
      const colors = {
        connected: 'bg-green-500',
        disconnected: 'bg-red-500',
        error: 'bg-red-500',
        connecting: 'bg-yellow-500'
      };
      
      statusIndicator.innerHTML = `
        <span class="w-2 h-2 rounded-full ${colors[status] || colors.connecting} ${status === 'connected' ? '' : 'animate-pulse'}"></span>
        <span class="text-gray-600">${text}</span>
      `;
    }
    
    function sendQuickMessage(message) {
      input.value = message;
      form.dispatchEvent(new Event('submit'));
    }
    
    // Focus input on load
    input.focus();
  </script>
</body>
</html>
